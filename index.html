<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNTD Values | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-hover: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #00f2ff;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --cosmic: #00f2ff;
            --nightmare: #bd00ff;
            --secret: #ff007a;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(0, 242, 255, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(189, 0, 255, 0.03) 0%, transparent 40%);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        .main-nav {
            position: fixed;
            top: 0; width: 100%;
            height: 80px;
            display: flex;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            background: rgba(11, 14, 20, 0.85);
        }

        .nav-container {
            width: 100%; max-width: 1200px;
            margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 24px;
        }

        .logo { 
            font-weight: 800; 
            font-size: 1.4rem; 
            text-decoration: none; 
            color: #fff; 
            letter-spacing: -0.5px;
        }
        .logo span { color: var(--accent); }

        .nav-links { display: flex; gap: 32px; list-style: none; margin: 0; padding: 0; align-items: center; }
        
        .nav-item {
            text-decoration: none; 
            color: var(--text-dim);
            font-weight: 600; 
            font-size: 0.9rem;
            transition: var(--transition);
        }
        .nav-item:hover { color: #fff; }

        .dropdown { position: relative; }
        .dropdown-trigger {
            color: var(--text-dim);
            font-weight: 600; font-size: 0.9rem;
            cursor: pointer;
            display: flex; align-items: center; gap: 6px;
            transition: var(--transition);
        }
        .dropdown:hover .dropdown-trigger { color: #fff; }

        .dropdown-menu {
            position: absolute; top: calc(100% + 15px); left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: #151921; border: 1px solid var(--border);
            border-radius: 16px; padding: 8px; min-width: 180px;
            opacity: 0; visibility: hidden;
            transition: var(--transition);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .dropdown:hover .dropdown-menu { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
        
        .dropdown-menu a {
            display: block; padding: 12px 16px; color: var(--text-dim);
            text-decoration: none; font-size: 0.85rem; font-weight: 600;
            border-radius: 10px; transition: 0.2s;
        }
        .dropdown-menu a:hover { background: rgba(255,255,255,0.05); color: var(--accent); }

        /* --- HERO --- */
        .hero { 
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%; 
            max-width: 1200px; 
            margin: 0 auto;
            padding: 120px 24px 60px; 
            text-align: center;
        }
        
        .hero h2 { 
            font-size: 0.9rem; 
            color: var(--accent); 
            text-transform: uppercase; 
            letter-spacing: 5px; 
            margin-bottom: 16px; 
            font-weight: 700;
            opacity: 0.8;
        }
        
        .hero h1 { 
            font-size: clamp(2.5rem, 8vw, 4rem); 
            font-weight: 800; 
            letter-spacing: -2px; 
            margin: 0 0 50px 0; 
            line-height: 1.1;
            background: linear-gradient(180deg, #fff 30%, rgba(255,255,255,0.5) 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        /* --- CARDS GRID --- */
        .currency-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            width: 100%;
            max-width: 1000px;
            perspective: 1000px;
        }

        .currency-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 40px 20px;
            text-decoration: none;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            position: relative;
            overflow: hidden;
            animation: cardEntrance 0.8s ease backwards;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .currency-card:nth-child(2) { animation-delay: 0.1s; }
        .currency-card:nth-child(3) { animation-delay: 0.2s; }

        .currency-card:hover {
            transform: translateY(-12px) scale(1.02);
            background: var(--card-hover);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .icon-wrap {
            width: 140px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
        }

        .unit-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
            transition: var(--transition);
        }

        /* Цветовые темы для карточек */
        .card-cosmic:hover { box-shadow: 0 20px 40px rgba(0, 242, 255, 0.15); border-color: var(--cosmic); }
        .card-nightmare:hover { box-shadow: 0 20px 40px rgba(189, 0, 255, 0.15); border-color: var(--nightmare); }
        .card-secret:hover { box-shadow: 0 20px 40px rgba(255, 0, 122, 0.15); border-color: var(--secret); }

        .card-cosmic:hover .unit-img { filter: drop-shadow(0 0 20px var(--cosmic)); }
        .card-nightmare:hover .unit-img { filter: drop-shadow(0 0 20px var(--nightmare)); }
        .card-secret:hover .unit-img { filter: drop-shadow(0 0 20px var(--secret)); }

        .cur-name { 
            font-size: 0.75rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            color: var(--text-dim); 
            letter-spacing: 2px; 
        }
        
        .cur-action { 
            font-weight: 800; 
            font-size: 1.5rem; 
            color: #fff; 
            margin: 0;
        }

        .footer-minimal { 
            padding: 60px 0 40px; 
            color: #475569; 
            font-size: 0.75rem; 
            font-weight: 700; 
            text-align: center; 
            letter-spacing: 1px;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 968px) {
            .currency-grid { grid-template-columns: repeat(2, 1fr); max-width: 700px; }
        }
        
        @media (max-width: 640px) { 
            .currency-grid { grid-template-columns: 1fr; } 
            .hero h1 { font-size: 2.5rem; }
            .nav-links { display: none; } /* Можно добавить бургер-меню */
            .icon-wrap { width: 120px; height: 120px; }
        }
    </style>
</head>
<body>

    <nav class="main-nav">
        <div class="nav-container">
            <a href="index.html" class="logo">FNTD<span>VALUES</span></a>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-item">Market</a></li>
                <li class="dropdown">
                    <div class="dropdown-trigger">Value List <small>▼</small></div>
                    <div class="dropdown-menu">
                        <a href="Cosmic.html">Cosmic</a>
                        <a href="Nightmare.html">Nightmare</a>
                    </div>
                </li>
                <li><a href="ValueCalculator.html" class="nav-item">Calculator</a></li>
            </ul>
        </div>
    </nav>

    <main class="hero">
        <h2>Unofficial Remastered</h2>
        <h1>FNTD Remaster<br>Value List</h1>

        <div class="currency-grid">
            <a href="Cosmic.html" class="currency-card card-cosmic">
                <div class="icon-wrap"> 
                    <img src="https://i.ibb.co.com/fzPb3kcz/Untitled-17.png" alt="Cosmic" class="unit-img">
                </div>
                <span class="cur-name">Unit Rarity</span>
                <h3 class="cur-action" style="color: var(--cosmic);">Cosmic</h3>
            </a>

            <a href="Nightmare.html" class="currency-card card-nightmare">
                <div class="icon-wrap">
                    <img src="https://i.ibb.co.com/k62gBwrV/Shadow-Bonnie.webp" alt="Nightmare" class="unit-img">
                </div>
                <span class="cur-name">Unit Rarity</span>
                <h3 class="cur-action" style="color: var(--nightmare);">Nightmare</h3>
            </a>
        </div>
            

        <footer class="footer-minimal">
            &copy; 2026 FNTD REMASTERED // PREMIUM TRADING INTERFACE
        </footer>
    </main>

</body>
</html>
