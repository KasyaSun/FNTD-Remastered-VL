    <style>
        :root {
            --bg: #0b0e14;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #00f2ff;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --loss: #ff4757;
            --win: #00ff88;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(0, 242, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(189, 0, 255, 0.05) 0%, transparent 50%);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; min-height: 100vh; overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        /* --- NAVIGATION --- */
        .main-nav {
            position: fixed; top: 0; width: 100%; height: 80px;
            display: flex; align-items: center; z-index: 1000;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px); background: rgba(11, 14, 20, 0.8);
        }
        .nav-container { width: 100%; max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; }
        .logo { font-weight: 800; font-size: 1.5rem; text-decoration: none; color: #fff; letter-spacing: -1.5px; }
        .logo span { color: var(--accent); }

        .nav-links { display: flex; list-style: none; gap: 35px; align-items: center; padding: 0; margin: 0; }
        .nav-links a { text-decoration: none; color: var(--text-dim); font-weight: 800; font-size: 0.85rem; text-transform: uppercase; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; }

        .dropdown { position: relative; }
        .dropdown-trigger { color: var(--text-dim); font-weight: 800; font-size: 0.85rem; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .dropdown-menu {
            position: absolute; top: 100%; left: 50%; transform: translateX(-50%) translateY(15px);
            background: #151921; border: 1px solid var(--border); border-radius: 12px; padding: 10px; min-width: 160px;
            opacity: 0; visibility: hidden; transition: 0.2s;
        }
        .dropdown:hover .dropdown-menu { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(5px); }
        .dropdown-menu a { display: block; padding: 10px; font-size: 0.8rem; color: var(--text-dim); text-transform: none; border-radius: 8px; font-weight: 800; }

        /* --- MAIN WRAPPER --- */
        .calc-wrapper { max-width: 1100px; margin: 120px auto 40px; padding: 0 20px; }

        .status-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px;
            padding: 20px; text-align: center; margin-bottom: 30px;
        }
        .status-card h1 { margin: 0; font-weight: 800; font-size: 1.2rem; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }

        .trade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        
        .trade-box { 
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 28px; 
            padding: 30px; display: flex; flex-direction: column; height: 600px; position: relative; backdrop-filter: blur(10px);
        }

        .trade-box h3 { font-size: 0.8rem; text-transform: uppercase; color: var(--text-dim); text-align: center; margin: 0 0 25px 0; font-weight: 800; letter-spacing: 2px; }

        .unit-slots { flex: 1; overflow-y: auto; margin-bottom: 120px; padding-right: 10px; display: flex; flex-direction: column; gap: 12px; }

        /* --- UNIT ROW IN SLOTS --- */
        .added-unit {
            background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 16px;
            padding: 12px 18px; display: flex; align-items: center; justify-content: space-between;
        }
        .added-unit span { font-weight: 800; font-size: 0.95rem; }
        .remove-btn { color: var(--loss); cursor: pointer; font-weight: 800; font-size: 1.2rem; }

        /* --- FOOTER OF BOX --- */
        .box-footer { position: absolute; bottom: 30px; left: 30px; right: 30px; }
        .total-row { display: flex; justify-content: space-between; align-items: center; padding-top: 20px; border-top: 1px solid var(--border); margin-bottom: 15px; font-weight: 800; }
        .total-row span:last-child { font-size: 2.2rem; color: var(--accent); letter-spacing: -1.5px; }

        .add-trigger { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; 
            padding: 18px; border-radius: 16px; cursor: pointer; font-weight: 800; width: 100%;
            text-transform: uppercase; font-size: 0.85rem; transition: 0.2s;
        }
        .add-trigger:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); color: var(--accent); }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); backdrop-filter: blur(20px); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #151921; border: 1px solid var(--border); width: 90%; max-width: 900px; border-radius: 35px; padding: 40px; }

        /* View Switching */
        #type-view { display: none; text-align: center; }
        
        .cat-tabs { display: flex; gap: 25px; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .tab { font-weight: 800; font-size: 1.1rem; color: #4b5563; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .tab.active { color: #fff; }

        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; max-height: 400px; overflow-y: auto; padding-right: 10px; }
        
        .catalog-item { 
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border); border-radius: 24px; padding: 20px; 
            display: flex; flex-direction: column; align-items: center; text-align: center; cursor: pointer; transition: 0.2s;
        }
        .catalog-item:hover { border-color: var(--accent); transform: translateY(-5px); }
        .catalog-item img { width: 60px; height: 60px; object-fit: contain; margin-bottom: 15px; }
        
        .u-name { font-weight: 800; font-size: 1rem; color: #fff; margin-bottom: 5px; }
        .u-val { font-weight: 800; font-size: 0.9rem; color: var(--accent); }

        /* Type Selector */
        .type-options { display: flex; gap: 20px; justify-content: center; margin: 30px 0; }
        .type-opt { 
            background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 30px; 
            border-radius: 24px; cursor: pointer; transition: 0.2s; min-width: 180px; 
        }
        .type-opt:hover { border-color: var(--accent); background: rgba(255,255,255,0.06); }
        .shiny-opt .price-val { color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.3); }
        .price-val { font-weight: 800; font-size: 1.5rem; display: block; margin-top: 10px; }

        @media (max-width: 768px) { .trade-grid { grid-template-columns: 1fr; } }
    </style>
</head>

        let currentSide = 'left';
        let trade = { left: [], right: [] };

        // Вспомогательные функции для O/C
        function formatPrice(p) {
            if (p === "O/C") return "O/C";
            return p.toLocaleString();
        }

        function priceToMath(p) {
            if (p === "O/C") return 999999999; // Число для логики сравнения
            return parseFloat(p) || 0;
        }

        function openCatalog(side) {
            currentSide = side;
            document.getElementById('catModal').style.display = 'flex';
            backToCatalog();
            loadCat('cosmic');
        }

        function closeCatalog() { document.getElementById('catModal').style.display = 'none'; }

        function loadCat(cat) {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => t.classList.toggle('active', t.innerText.toLowerCase() === cat));
            
            const grid = document.getElementById('catGrid');
            const filtered = units.filter(u => u.cat === cat);
            
            grid.innerHTML = filtered.map(u => `
                <div class="catalog-item" onclick="startAddProcess('${u.name}')">
                    <img src="${u.img}">
                    <span class="item-name">${u.name}</span>
                    <span class="item-price ${u.val === 'O/C' ? 'oc-text' : ''}">${formatPrice(u.val)}</span>
                </div>
            `).join('');
        }

        function startAddProcess(name) {
            activeUnit = units.find(u => u.name === name);
            if (activeUnit.cat === 'items') { confirmAdd(false); return; }
            
            document.getElementById('catalog-view').style.display = 'none';
            document.getElementById('type-view').style.display = 'flex';
            document.getElementById('sel-name').innerText = activeUnit.name;
            
            const pNorm = document.getElementById('p-norm');
            const pShiny = document.getElementById('p-shiny');
            
            pNorm.innerText = formatPrice(activeUnit.val);
            pShiny.innerText = formatPrice(activeUnit.sval);
            
            pNorm.className = activeUnit.val === "O/C" ? "price-val oc-text" : "price-val";
            pShiny.className = activeUnit.sval === "O/C" ? "price-val oc-text" : "price-val";
        }

        function confirmAdd(isShiny) {
            const price = isShiny ? activeUnit.sval : activeUnit.val;
            const displayName = isShiny ? activeUnit.name + " ✨" : activeUnit.name;
            
            trade[currentSide].push({
                ...activeUnit,
                displayName: displayName,
                displayVal: price,
                isShiny: isShiny,
                iid: Date.now() + Math.random()
            });
            
            closeCatalog();
            updateUI();
        }

        function backToCatalog() {
            document.getElementById('catalog-view').style.display = 'block';
            document.getElementById('type-view').style.display = 'none';
        }

        function removeUnit(side, iid) {
            trade[side] = trade[side].filter(u => u.iid !== iid);
            updateUI();
        }

        function updateUI() {
            ['left', 'right'].forEach(side => {
                const container = document.getElementById(`slots-${side}`);
                const totalText = document.getElementById(`total-${side}`);
                
                let hasOC = false;
                let sum = 0;

                trade[side].forEach(u => {
                    if (u.displayVal === "O/C") hasOC = true;
                    else sum += u.displayVal;
                });

                totalText.innerText = hasOC ? "O/C" : sum.toLocaleString();
                totalText.className = hasOC ? "oc-text" : "";

                container.innerHTML = trade[side].map(u => `
                    <div class="added-unit ${u.isShiny ? 'is-shiny' : ''}" style="border-left: 4px solid var(--${u.cat})">
                        <img src="${u.img}">
                        <div class="info">
                            <div class="name">${u.displayName}</div>
                            <div class="price ${u.displayVal === 'O/C' ? 'oc-text' : ''}">${formatPrice(u.displayVal)}</div>
                        </div>
                        <div class="remove-btn" onclick="removeUnit('${side}', ${u.iid})">✕</div>
                    </div>
                `).join('');
            });

            // Logic Win/Loss
            const valL = trade.left.reduce((acc, u) => acc + priceToMath(u.displayVal), 0);
            const valR = trade.right.reduce((acc, u) => acc + priceToMath(u.displayVal), 0);
            const status = document.getElementById('trade-status');

            if (valL === 0 && valR === 0) {
                status.innerText = "SELECT UNITS";
                status.style.color = "var(--text-dim)";
            } else {
                const ratio = valR / (valL || 1);
                if (ratio >= 0.9 && ratio <= 1.1) { status.innerText = "FAIR TRADE"; status.style.color = "#fff"; }
                else if (ratio > 1.1) { status.innerText = "BIG WIN"; status.style.color = "var(--win)"; }
                else { status.innerText = "BIG LOSS"; status.style.color = "var(--loss)"; }
            }
        }
    </script>
</body>
</html>
